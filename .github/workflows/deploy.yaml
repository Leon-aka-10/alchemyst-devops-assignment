name: Deploy Alchemyst Infrastructure

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.github/workflows/destroy.yml'

permissions:
  contents: read

jobs:
  lint-test:
    name: Validate worker code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: pip install flake8 --quiet

      - name: Lint inference worker
        run: flake8 workers/inference-worker/ --max-line-length=120

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TypeScript deps
        run: npm install
        working-directory: workers/caller-worker/

      - name: Type check caller worker
        run: npx tsc --noEmit
        working-directory: workers/caller-worker/

  provision:
    name: Provision infrastructure
    runs-on: ubuntu-latest
    needs: lint-test
    outputs:
      gateway_ip:   ${{ steps.tf_out.outputs.gateway_ip }}
      engine_ip:    ${{ steps.tf_out.outputs.engine_ip }}
      inference_ip: ${{ steps.tf_out.outputs.inference_ip }}
      caller_ip:    ${{ steps.tf_out.outputs.caller_ip }}

    steps:
      - uses: actions/checkout@v4

      # Student account auth — no service principal available on university AD tenant
      - name: Azure CLI login
        run: |
          az login \
            --username "${{ secrets.AZURE_USERNAME }}" \
            --password "${{ secrets.AZURE_PASSWORD }}"
          az account set \
            --subscription "3088b175-92ef-4dd7-9020-ee7ae696fd1a"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform init
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: terraform init
        working-directory: terraform/

      - name: Debug SSH key
        run: |
          echo "SSH_PUBLIC_KEY length: ${#SSH_PUB}"
          echo "First 20 chars: ${SSH_PUB:0:20}"
          echo "Starts with ssh-rsa: $(echo $SSH_PUB | grep -c 'ssh-rsa')"
        env:
          SSH_PUB: ${{ secrets.SSH_PUBLIC_KEY }}

      # TF_VAR_ pattern used instead of -var flags
      # Prevents shell misinterpretation of SSH key special characters (spaces, ==)
      - name: Terraform apply
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
          TF_VAR_admin_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_admin_ip: ${{ secrets.ADMIN_IP }}
        run: terraform apply -auto-approve
        working-directory: terraform/

      - name: Capture Terraform outputs
        id: tf_out
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: |
          echo "gateway_ip=$(terraform output -raw gateway_public_ip)"       >> $GITHUB_OUTPUT
          echo "engine_ip=$(terraform output -raw engine_private_ip)"        >> $GITHUB_OUTPUT
          echo "inference_ip=$(terraform output -raw inference_private_ip)"  >> $GITHUB_OUTPUT
          echo "caller_ip=$(terraform output -raw caller_private_ip)"        >> $GITHUB_OUTPUT
        working-directory: terraform/

  deploy:
    name: Deploy workers
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible --quiet

      - name: Write SSH private key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Build Ansible inventory
        run: |
          GATEWAY="${{ needs.provision.outputs.gateway_ip }}"
          INFERENCE="${{ needs.provision.outputs.inference_ip }}"
          CALLER="${{ needs.provision.outputs.caller_ip }}"

          cat > ansible/inventory.ini << EOF
          [gateway]
          ${GATEWAY} ansible_user=azureuser ansible_ssh_private_key_file=/tmp/deploy_key ansible_ssh_extra_args='-o StrictHostKeyChecking=no'

          [inference]
          ${INFERENCE} ansible_user=azureuser ansible_ssh_private_key_file=/tmp/deploy_key ansible_ssh_extra_args='-o StrictHostKeyChecking=no -o ProxyJump=azureuser@${GATEWAY}'

          [caller]
          ${CALLER} ansible_user=azureuser ansible_ssh_private_key_file=/tmp/deploy_key ansible_ssh_extra_args='-o StrictHostKeyChecking=no -o ProxyJump=azureuser@${GATEWAY}'
          EOF

      - name: Wait for gateway VM to be SSH-ready
        run: |
          GATEWAY="${{ needs.provision.outputs.gateway_ip }}"
          echo "Waiting for gateway SSH on ${GATEWAY}..."
          for i in $(seq 1 15); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i /tmp/deploy_key \
                   azureuser@${GATEWAY} "echo ready" 2>/dev/null; then
              echo "Gateway SSH ready on attempt $i"
              break
            fi
            echo "Attempt $i — waiting 20s..."
            sleep 20
          done

      - name: Deploy iii engine + NGINX gateway
        run: |
          ansible-playbook -i ansible/inventory.ini \
            ansible/deploy-gateway.yml \
            -e "engine_ip=${{ needs.provision.outputs.engine_ip }}"

      - name: Deploy inference worker
        run: |
          ansible-playbook -i ansible/inventory.ini \
            ansible/deploy-inference-worker.yml \
            -e "engine_ip=${{ needs.provision.outputs.engine_ip }}"

      - name: Deploy caller worker
        run: |
          ansible-playbook -i ansible/inventory.ini \
            ansible/deploy-caller-worker.yml \
            -e "engine_ip=${{ needs.provision.outputs.engine_ip }}"

      - name: Health check — gateway /health endpoint
        run: |
          GATEWAY="${{ needs.provision.outputs.gateway_ip }}"
          echo "Polling http://${GATEWAY}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${GATEWAY}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Gateway healthy on attempt $i"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 15s..."
            sleep 15
          done
          echo "Health check failed after 12 attempts"
          exit 1

      - name: Smoke test — inference endpoint
        run: |
          GATEWAY="${{ needs.provision.outputs.gateway_ip }}"
          echo "Sending test inference request to http://${GATEWAY}/v1/chat/completions ..."
          curl -s -X POST "http://${GATEWAY}/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"Say hello in one sentence."}]}' \
            --max-time 120
          echo ""
          echo "Smoke test complete"

  destroy-on-failure:
    name: Destroy infrastructure on failure
    runs-on: ubuntu-latest
    needs: [provision, deploy]
    if: failure()

    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI login
        run: |
          az login \
            --username "${{ secrets.AZURE_USERNAME }}" \
            --password "${{ secrets.AZURE_PASSWORD }}"
          az account set \
            --subscription "3088b175-92ef-4dd7-9020-ee7ae696fd1a"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform init
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: terraform init
        working-directory: terraform/

      - name: Terraform destroy
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
          TF_VAR_admin_ip: ${{ secrets.ADMIN_IP }}
        run: |
          echo "Pipeline failed — waiting 3 minutes for Azure NIC reservations to clear..."
          sleep 180
          echo "Destroying infrastructure..."
          # -lock=false handles cases where provision job still holds the lock
          terraform destroy -auto-approve -lock=false
        working-directory: terraform/

      - name: Confirm destruction
        run: |
          echo "Infrastructure destroyed. Checking remaining resources..."
          az group list \
            --query "[?starts_with(name,'rg-alchemyst')].{Name:name,State:properties.provisioningState}" \
            -o table
