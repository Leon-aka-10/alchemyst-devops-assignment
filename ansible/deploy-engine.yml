---
- name: Deploy iii engine
  hosts: engine
  become: true

  vars:
    iii_version: "latest"

  tasks:
    - name: Install curl and unzip
      apt:
        name: [curl, unzip]
        state: present
        update_cache: yes

    - name: Install iii CLI
      shell: curl -fsSL https://iii.dev/install.sh | sh
      args:
        creates: /usr/local/bin/iii

    - name: Create engine directory
      file:
        path: /opt/iii-engine/data
        state: directory
        owner: azureuser
        mode: '0755'

    - name: Copy config.yaml
      template:
        src: ../config/config.yaml
        dest: /opt/iii-engine/config.yaml
        owner: azureuser

    - name: Install systemd service
      copy:
        src: ../systemd/iii-engine.service
        dest: /etc/systemd/system/iii-engine.service

    - name: Enable and start iii engine
      systemd:
        name: iii-engine
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for engine WebSocket port
      wait_for:
        port: 49134
        timeout: 30