---
- name: Deploy inference worker
  hosts: inference
  become: true

  tasks:
    - name: Install Python and pip
      apt:
        name: [python3, python3-pip, python3-venv]
        state: present
        update_cache: yes

    - name: Create worker directory
      file:
        path: /opt/inference-worker
        state: directory
        owner: azureuser

    - name: Copy worker files
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: azureuser
      loop:
        - { src: ../workers/inference-worker/inference_worker.py, dest: /opt/inference-worker/inference_worker.py }
        - { src: ../workers/inference-worker/requirements.txt,    dest: /opt/inference-worker/requirements.txt }

    - name: Install Python dependencies
      pip:
        requirements: /opt/inference-worker/requirements.txt
        executable: pip3

    - name: Install systemd service with engine IP
      template:
        src: ../systemd/inference-worker.service
        dest: /etc/systemd/system/inference-worker.service
      vars:
        engine_ip: "{{ engine_ip }}"

    - name: Enable and start inference worker
      systemd:
        name: inference-worker
        enabled: yes
        state: started
        daemon_reload: yes