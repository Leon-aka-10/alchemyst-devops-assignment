workers:
  - name: iii-observability
    config:
      enabled: true
      service_name: alchemyst-inference
      exporter: memory
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_console_output: true
      sampling_ratio: 1.0

  - name: iii-queue
    config:
      adapter:
        name: builtin

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: /opt/iii-engine/data/state_store.db

  - name: iii-http
    config:
      port: 3111
      host: 0.0.0.0      # must be 0.0.0.0 — NGINX proxies to this locally
      default_timeout: 120000
      concurrency_request_limit: 10
      cors:
        allowed_origins:
          - '*'
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS