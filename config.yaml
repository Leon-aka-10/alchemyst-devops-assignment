# iii engine configuration for production deployment
workers:
  - name: iii-observability
    config:
      enabled: true
      service_name: alchemyst-inference
      exporter: memory
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_console_output: true
      sampling_ratio: 1.0

  - name: iii-queue
    config:
      adapter:
        name: builtin

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: /opt/iii-engine/data/state_store.db

  - name: iii-http
    config:
      port: 3111
      host: 0.0.0.0        # Changed from 127.0.0.1 — must be reachable across VNet
      default_timeout: 120000   # 120s — model inference is slow
      concurrency_request_limit: 10   # conservative — model is CPU-bound
      cors:
        allowed_origins:
          - '*'
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  # Workers connect remotely — no worker_path needed on engine VM
  # Workers register themselves when they start and connect via ws://ENGINE_IP:49134