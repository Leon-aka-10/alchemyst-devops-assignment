upstream iii_http {
    # Engine VM private IP — iii-http listens on 0.0.0.0:3111
    server ENGINE_PRIVATE_IP:3111;
    keepalive 8;
}

limit_req_zone $binary_remote_addr zone=inference_limit:10m rate=5r/s;

server {
    listen 80;

    # Inference endpoint
    location /v1/chat/completions {
        limit_req zone=inference_limit burst=10 nodelay;

        proxy_pass         http://iii_http;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Model inference is slow on CPU — must be generous
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
    }

    # Health check — used by GitHub Actions pipeline to verify deployment
    location /health {
        return 200 '{"status":"ok","service":"alchemyst-inference-gateway"}';
        add_header Content-Type application/json;
    }

    # Catch all
    location / {
        return 404 '{"error":"not found"}';
        add_header Content-Type application/json;
    }
}