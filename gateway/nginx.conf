upstream iii_http {
  server 127.0.0.1:3111;  # iii-http now local — engine on same VM
  keepalive 8;
}

limit_req_zone $binary_remote_addr zone=inference_limit:10m rate=5r/s;

server {
  listen 80;

  location /v1/chat/completions {
    limit_req zone=inference_limit burst=10 nodelay;
    proxy_pass         http://iii_http;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout    180s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
  }

  location /health {
    return 200 '{"status":"ok","service":"alchemyst-inference-gateway"}';
    add_header Content-Type application/json;
  }

  location / {
    return 404 '{"error":"not found"}';
    add_header Content-Type application/json;
  }
}